<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
      <title>Cadastro de Torcedores</title>
    <link rel="stylesheet" href="style-cadastro.css">
</head>
<body>

    <h1><i>Cadastro de Torcedores da Noruega</i></h1>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="data">Data de Nascimento:</label><br>
        <input type="date" id="data" name="data"><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="pais">País:</label><br>
        <input type="text" id="pais" name="pais"><br><br>

        <label for="jogador">Jogador Favorito:</label><br>
        <select id="jogador" name="jogador">
            <option>Erling Haaland</option>
            <option>Martin Ødegaard</option>
            <option>Alexander Sørloth</option>
            <option>Kristoffer Ajer</option>
            <option>Julian Ryerson</option>
        </select>

        <br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>
